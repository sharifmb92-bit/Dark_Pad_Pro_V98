<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dark Pad Pro V11</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050a0f; color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .bg-pure-black { background-color: #000000 !important; }
        
        /* Prioridad de Colores */
        .c-slate { background-color: #1e293b !important; }
        .c-zinc { background-color: #27272a !important; }
        .c-neutral { background-color: #262626 !important; }
        .c-stone { background-color: #292524 !important; }
        .c-red { background-color: #450a0a !important; }
        .c-orange { background-color: #431407 !important; }
        .c-amber { background-color: #451a03 !important; }
        .c-yellow { background-color: #422006 !important; }
        .c-green { background-color: #064e3b !important; }
        .c-emerald { background-color: #065f46 !important; }
        .c-teal { background-color: #134e4a !important; }
        .c-cyan { background-color: #164e63 !important; }
        .c-sky { background-color: #0c4a6e !important; }
        .c-blue { background-color: #1e3a8a !important; }
        .c-indigo { background-color: #312e81 !important; }
        .c-violet { background-color: #4c1d95 !important; }
        .c-fuchsia { background-color: #701a75 !important; }
        .c-pink { background-color: #831843 !important; }
        .c-rose { background-color: #881337 !important; }

        /* Zoom de Interfaz */
        .scale-small { transform: scale(0.85); transform-origin: top center; }
        .scale-large { transform: scale(1.08); transform-origin: top center; }

        .modal-container { 
            width: 94%; 
            max-width: 400px; 
            max-height: 85vh; 
            margin-top: 1rem;
            border-radius: 2.5rem; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .alarm-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border: 4px solid #f97316; animation: pulse-border 0.5s infinite; }
        @keyframes pulse-border { 0%, 100% { border-color: #f97316; } 50% { border-color: #ef4444; } }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.6; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" :class="[config.pureBlack ? 'bg-pure-black' : '', 'scale-' + config.uiScale]">

    <div x-show="activeAlarm" x-cloak class="alarm-overlay">
        <span class="material-symbols-outlined text-9xl text-orange-500 animate-bounce mb-6">notifications_active</span>
        <h2 class="text-4xl font-black text-white mb-4 uppercase">¡TURNO AHORA!</h2>
        <p class="text-2xl text-sky-400 font-bold mb-10" x-text="activeAlarm?.titulo || 'Revisar registro'"></p>
        <button @click="stopAlarm()" class="bg-orange-600 text-white px-16 py-6 rounded-3xl font-black text-2xl shadow-2xl active:scale-95">DETENER</button>
    </div>

    <header class="p-5 pb-2 sticky top-0 z-50 bg-inherit border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-black text-orange-500 italic uppercase">Dark Pad</h1>
                <p class="text-[8px] font-black text-sky-500 uppercase tracking-widest">Pro V11 Final</p>
            </div>
            <button @click="ui.showSettings = true" class="p-3 bg-white/5 rounded-full"><span class="material-symbols-outlined text-sky-400">settings</span></button>
        </div>
        
        <div class="flex items-center justify-between bg-white/5 p-2 rounded-2xl border border-white/10">
            <div class="flex items-center gap-1">
                <button @click="ui.showSearch = !ui.showSearch" class="p-2"><span class="material-symbols-outlined text-sky-400 text-sm">search</span></button>
                <input x-show="ui.showSearch" x-model="search" type="text" placeholder="Buscar..." class="w-24 bg-transparent outline-none text-xs text-white">
            </div>
            <div class="flex gap-1">
                <button @click="ui.showFullCalendar = true" class="p-2"><span class="material-symbols-outlined text-sky-400">calendar_month</span></button>
                <button @click="selectedDate = null; search = ''" class="p-2"><span class="material-symbols-outlined text-white/40">restart_alt</span></button>
            </div>
        </div>
    </header>

    <section class="px-4 py-3 bg-white/5 overflow-x-auto whitespace-nowrap hide-scrollbar flex gap-2 border-b border-white/5">
        <template x-for="day in recentDays" :key="day.dateStr">
            <div @click="selectedDate = (selectedDate === day.dateStr ? null : day.dateStr)" 
                 class="flex flex-col items-center min-w-[50px] p-2.5 rounded-2xl transition-all"
                 :class="selectedDate === day.dateStr ? 'bg-sky-500 text-white' : 'bg-white/5'">
                <span class="text-[7px] uppercase font-black opacity-50" x-text="day.weekday"></span>
                <span class="text-sm font-black" x-text="day.dayNum"></span>
                <div x-show="day.hasNote" class="w-1 h-1 bg-orange-500 rounded-full mt-1"></div>
            </div>
        </template>
    </section>

    <main class="p-4 grid grid-cols-2 gap-4 h-[calc(100vh-250px)] overflow-y-auto pb-32 hide-scrollbar">
        <template x-for="nota in notasFiltradas" :key="nota.id">
            <div @click="abrirNota(nota)" 
                 class="p-5 h-44 rounded-[2rem] flex flex-col justify-between border border-white/5 shadow-xl transition-all active:scale-95" 
                 :class="[nota.estilo, nota.pinned ? 'ring-2 ring-orange-500' : '']">
                <div>
                    <h4 class="text-[9px] font-black uppercase opacity-60 truncate mb-1" x-text="nota.titulo || 'Sin título'"></h4>
                    <p class="font-bold text-white leading-tight line-clamp-3 text-sm" x-text="nota.type === 'checklist' ? '✓ Tareas' : nota.texto"></p>
                </div>
                <div class="flex justify-between items-center opacity-40 text-[8px] font-black">
                    <span x-text="nota.fecha"></span>
                    <span x-show="nota.reminderTime" class="material-symbols-outlined text-[12px] text-orange-400">alarm</span>
                </div>
            </div>
        </template>
    </main>

    <div class="fixed bottom-10 right-6 z-[100] flex flex-col items-end gap-3">
        <div x-show="ui.showFabMenu" x-transition x-cloak class="flex flex-col gap-2 mb-2">
            <button @click="nuevaNota('checklist')" class="bg-sky-600 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-2xl">Checklist</button>
            <button @click="nuevaNota('note')" class="bg-orange-600 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-2xl">Nota</button>
        </div>
        <button @click="ui.showFabMenu = !ui.showFabMenu" 
                class="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center shadow-2xl"
                :class="ui.showFabMenu ? 'rotate-45 bg-red-500 text-white' : ''">
            <span class="material-symbols-outlined text-4xl font-black">add</span>
        </button>
    </div>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/90 z-[200] flex items-start justify-center backdrop-blur-md overflow-y-auto pt-4">
        <div class="modal-container shadow-2xl" :class="notaExpandida?.estilo">
            <div class="p-4 flex justify-between items-center bg-black/20">
                <span class="text-[10px] font-black uppercase opacity-50" x-text="notaExpandida?.fecha"></span>
                <button @click="cerrarNota()" class="p-2 bg-black/30 rounded-full"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="px-5 pt-4"><input x-model="notaExpandida.titulo" placeholder="Título..." class="w-full bg-white/10 p-4 rounded-2xl text-white font-bold outline-none border border-white/5"></div>
            <div class="flex-grow p-5 min-h-[150px]">
                <template x-if="notaExpandida?.type === 'note'"><textarea x-model="notaExpandida.texto" class="w-full h-full bg-transparent outline-none text-white text-lg"></textarea></template>
                <template x-if="notaExpandida?.type === 'checklist'">
                    <div class="space-y-2">
                        <template x-for="(item, index) in notaExpandida.items">
                            <div class="bg-black/20 p-3 rounded-2xl flex items-center gap-3"><button @click="item.done = !item.done"><span class="material-symbols-outlined text-sky-400" x-text="item.done ? 'check_circle' : 'circle'"></span></button><input x-model="item.text" class="bg-transparent outline-none flex-grow text-white"><button @click="notaExpandida.items.splice(index, 1)"><span class="material-symbols-outlined text-red-500 text-sm">delete</span></button></div>
                        </template>
                        <button @click="notaExpandida.items.push({text: '', done: false})" class="w-full p-4 border border-dashed border-white/20 rounded-2xl text-[10px] font-black uppercase opacity-50">+ Añadir Tarea</button>
                    </div>
                </template>
            </div>
            <div x-show="ui.showAlarmPanel" class="p-5 bg-black/40 border-t border-white/10">
                <input type="time" x-model="notaExpandida.reminderTime" class="bg-white/10 border border-white/20 p-4 rounded-xl w-full text-white font-black text-2xl outline-none">
                <button @click="ui.showAlarmPanel = false; guardar()" class="w-full bg-sky-600 mt-3 p-4 rounded-2xl font-black text-xs uppercase">Confirmar Hora</button>
            </div>
            <div class="p-6 flex justify-around border-t border-white/5 bg-black/30">
                <button @click="ui.showAlarmPanel = !ui.showAlarmPanel" :class="notaExpandida?.reminderTime ? 'text-orange-400' : 'text-white/30'"><span class="material-symbols-outlined">alarm</span></button>
                <button @click="notaExpandida.pinned = !notaExpandida.pinned; guardar()" :class="notaExpandida?.pinned ? 'text-sky-400' : 'text-white/30'"><span class="material-symbols-outlined">push_pin</span></button>
                <button @click="borrarNota()" class="text-red-500/30"><span class="material-symbols-outlined">delete</span></button>
            </div>
        </div>
    </div>

    <div x-show="ui.showSettings" x-transition x-cloak class="fixed inset-0 bg-[#050a0f] z-[500] p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-black uppercase italic">Control</h2><button @click="ui.showSettings = false" class="bg-sky-500 px-6 py-2 rounded-full text-[10px] font-black uppercase">Cerrar</button></div>
        <div class="space-y-6">
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                <p class="text-[10px] font-black uppercase opacity-40 mb-4">Zoom Interfaz</p>
                <div class="flex gap-2">
                    <button @click="config.uiScale = 'small'; guardar()" class="flex-grow p-4 rounded-2xl text-[10px] font-black" :class="config.uiScale === 'small' ? 'bg-sky-600' : 'bg-white/5'">Peq</button>
                    <button @click="config.uiScale = 'normal'; guardar()" class="flex-grow p-4 rounded-2xl text-[10px] font-black" :class="config.uiScale === 'normal' ? 'bg-sky-600' : 'bg-white/5'">Norm</button>
                    <button @click="config.uiScale = 'large'; guardar()" class="flex-grow p-4 rounded-2xl text-[10px] font-black" :class="config.uiScale === 'large' ? 'bg-sky-600' : 'bg-white/5'">Gran</button>
                </div>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                <p class="text-[10px] font-black uppercase opacity-40 mb-4">Seguridad</p>
                <div class="grid grid-cols-2 gap-3">
                    <button @click="exportar()" class="bg-green-600/20 p-4 rounded-2xl flex flex-col items-center gap-2 text-[10px] font-black"><span class="material-symbols-outlined">download</span>BACKUP</button>
                    <button @click="$refs.fileInput.click()" class="bg-orange-600/20 p-4 rounded-2xl flex flex-col items-center gap-2 text-[10px] font-black"><span class="material-symbols-outlined">upload</span>RESTAURAR</button>
                    <input type="file" x-ref="fileInput" class="hidden" @change="importar($event)">
                </div>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10 flex justify-between items-center">
                <span class="font-bold text-sm">Negro AMOLED</span>
                <button @click="config.pureBlack = !config.pureBlack; guardar()" class="w-12 h-6 rounded-full p-1" :class="config.pureBlack ? 'bg-sky-500' : 'bg-white/10'"><div class="w-4 h-4 bg-white rounded-full transition-transform" :class="config.pureBlack ? 'translate-x-6' : ''"></div></button>
            </div>
        </div>
    </div>

    <div x-show="ui.showFullCalendar" x-transition x-cloak class="fixed inset-0 bg-black/95 z-[300] flex items-center justify-center p-4">
        <div class="bg-[#1c2833] w-full max-w-xs rounded-[2.5rem] p-6 border border-white/10">
            <div class="flex justify-between items-center mb-6 font-black uppercase text-xs"><h2>Historial</h2><button @click="ui.showFullCalendar = false"><span class="material-symbols-outlined">close</span></button></div>
            <div class="grid grid-cols-7 gap-2">
                <template x-for="day in fullMonthDays" :key="day.dateStr">
                    <button @click="selectedDate = day.dateStr; ui.showFullCalendar = false" class="aspect-square flex flex-col items-center justify-center rounded-xl text-[10px] font-bold" :class="selectedDate === day.dateStr ? 'bg-sky-500' : 'bg-white/5'"><span x-text="day.dayNum"></span><div x-show="day.hasNote" class="w-1 h-1 bg-orange-500 rounded-full mt-1"></div></button>
                </template>
            </div>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null, search: '', selectedDate: null, activeAlarm: null,
                ui: { showSearch: false, showSettings: false, showAlarmPanel: false, showFullCalendar: false, showFabMenu: false },
                config: { pureBlack: false, uiScale: 'normal' },
                estilos: ['c-slate', 'c-zinc', 'c-neutral', 'c-stone', 'c-red', 'c-orange', 'c-amber', 'c-yellow', 'c-green', 'c-emerald', 'c-teal', 'c-cyan', 'c-sky', 'c-blue', 'c-indigo', 'c-violet', 'c-fuchsia', 'c-pink', 'c-rose'],

                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v11')) || [];
                    this.config = JSON.parse(localStorage.getItem('darkpad_conf_v11')) || this.config;
                    setInterval(() => {
                        const h = new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0');
                        this.notas.forEach(n => {
                            if (n.reminderTime === h) {
                                this.activeAlarm = n;
                                n.reminderTime = null; this.guardar();
                                if (window.navigator.vibrate) window.navigator.vibrate([500, 110, 500, 110, 450, 110, 200, 110, 200]);
                            }
                        });
                    }, 20000);
                },
                stopAlarm() { this.activeAlarm = null; if (window.navigator.vibrate) window.navigator.vibrate(0); },
                nuevaNota(tipo) {
                    const n = { id: Date.now(), type: tipo, titulo: '', texto: '', items: tipo === 'checklist' ? [{text:'', done:false}] : [], fecha: new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}), estilo: this.estilos[Math.floor(Math.random() * this.estilos.length)], pinned: false, reminderTime: null };
                    this.notas.unshift(n); this.guardar(); this.abrirNota(n); this.ui.showFabMenu = false;
                },
                abrirNota(n) { this.notaExpandida = n; this.ui.showAlarmPanel = false; },
                cerrarNota() { this.guardar(); this.notaExpandida = null; },
                guardar() { localStorage.setItem('darkpad_v11', JSON.stringify(this.notas)); localStorage.setItem('darkpad_conf_v11', JSON.stringify(this.config)); },
                borrarNota() { if(confirm("¿Borrar?")) { this.notas = this.notas.filter(n => n.id !== this.notaExpandida.id); this.cerrarNota(); } },
                exportar() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(this.notas)], {type:'application/json'})); a.download = 'backup_darkpad.json'; a.click(); },
                importar(e) { const r = new FileReader(); r.onload = (f) => { this.notas = JSON.parse(f.target.result); this.guardar(); location.reload(); }; r.readAsText(e.target.files[0]); },
                get recentDays() {
                    const days = []; for(let i=0; i<14; i++) { const d = new Date(); d.setDate(d.getDate()-i); const s = d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}); days.push({ dateStr: s, dayNum: d.getDate(), weekday: d.toLocaleDateString('es-ES', {weekday:'short'}), hasNote: this.notas.some(n => n.fecha === s)}); } return days;
                },
                get fullMonthDays() {
                    const days = []; for(let i=30; i>=0; i--) { const d = new Date(); d.setDate(new Date().getDate()-i); const s = d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}); days.push({ dateStr: s, dayNum: d.getDate(), hasNote: this.notas.some(n => n.fecha === s)}); } return days;
                },
                get notasFiltradas() {
                    return this.notas.filter(n => (n.texto + n.titulo).toLowerCase().includes(this.search.toLowerCase()) && (!this.selectedDate || n.fecha === this.selectedDate)).sort((a,b) => b.pinned - a.pinned || b.id - a.id);
                }
            }
        }
    </script>
</body>
</html>
